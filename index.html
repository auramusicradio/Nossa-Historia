<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Domínio Online - Multiplayer Corrigido</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* (mesmo CSS anterior - manter) */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
    body { background: linear-gradient(145deg, #1a4d2a 0%, #0c2a1a 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; }
    .screen { width: 100%; max-width: 1400px; }
    .hidden { display: none; }
    .lobby-container { background: rgba(0,0,0,0.65); backdrop-filter: blur(12px); border-radius: 48px; padding: 32px 24px; max-width: 800px; margin: 0 auto; border: 1px solid #ffd966aa; }
    .lobby-container h1 { font-size: 2rem; color: #ffdf8c; text-align: center; margin-bottom: 24px; }
    .room-list { background: #00000050; border-radius: 32px; padding: 16px; margin: 20px 0; max-height: 400px; overflow-y: auto; }
    .room-item { background: #2c2a1eaa; border-radius: 24px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border: 1px solid #c9a458; }
    .room-info { flex: 2; }
    .room-name { font-weight: bold; color: #ffeaac; }
    .room-details { font-size: 0.8rem; color: #d4c28a; }
    .join-room-btn { background: #4a7c59; padding: 6px 16px; font-size: 0.9rem; margin: 0; box-shadow: 0 2px 0 #2a4a35; }
    .create-room-form, .join-code-form { background: #00000060; border-radius: 28px; padding: 20px; margin-top: 20px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .form-row input, .form-row select { flex: 1; padding: 10px; border-radius: 40px; border: none; background: #fff7e8; }
    button { background: #f5b042; border: none; padding: 10px 20px; border-radius: 60px; font-weight: bold; cursor: pointer; margin: 4px; box-shadow: 0 3px 0 #9b5818; }
    button:active { transform: translateY(2px); }
    .game-chat-layout { display: flex; flex-wrap: wrap; gap: 20px; }
    .game-area { flex: 3; min-width: 280px; background: #0e2f1cd9; border-radius: 40px; padding: 20px; backdrop-filter: blur(4px); border: 1px solid #e6c280; transition: transform 0.3s; }
    .chat-area { flex: 1.2; min-width: 260px; background: #1a2a1ad9; border-radius: 40px; padding: 16px; display: flex; flex-direction: column; backdrop-filter: blur(4px); border: 1px solid #bfa15b; }
    .players-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .player-card { background: #00000060; border-radius: 32px; padding: 8px 16px; text-align: center; flex: 1; color: #f7eec5; font-weight: bold; }
    .player-card.active-turn { background: #c98f2eaa; box-shadow: 0 0 0 2px gold; }
    .board { background: #1c3a2bd9; border-radius: 48px; padding: 20px; margin: 15px 0; min-height: 130px; }
    .domino-chain { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; align-items: center; }
    .domino-piece { background: #fef5e2; width: 70px; height: 100px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.7rem; box-shadow: 0 6px 12px black; border: 1px solid #b97f44; }
    .domino-hand { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
    .domino-hand .domino-piece { cursor: pointer; transition: transform 0.1s; }
    .domino-hand .domino-piece:hover { transform: translateY(-8px); background: #fff2dd; }
    .valid-highlight { box-shadow: 0 0 0 3px #ffcc44, 0 0 0 6px #ffa600; }
    .action-bar { display: flex; gap: 12px; justify-content: center; margin: 16px 0; flex-wrap: wrap; }
    .chat-messages { flex: 1; background: #0f1f0faa; border-radius: 28px; padding: 12px; height: 350px; overflow-y: auto; margin-bottom: 12px; }
    .chat-message { padding: 5px 8px; border-bottom: 1px solid #b9a45860; font-size: 0.85rem; color: #f0e2b6; }
    .chat-input-area { display: flex; gap: 8px; }
    .chat-input-area input { flex: 1; border-radius: 40px; border: none; padding: 10px 15px; }
    .reactions { display: flex; gap: 10px; margin-top: 8px; justify-content: center; }
    .reaction-btn { background: #332d1e; font-size: 1.3rem; padding: 6px 12px; box-shadow: none; margin: 0; }
    @media (max-width: 800px) { .domino-piece { width: 55px; height: 80px; font-size: 1.2rem; } }
    .status-text { background: #00000070; border-radius: 32px; padding: 8px; text-align: center; font-weight: bold; color: #ffdd99; margin-top: 12px; }
    .side-choice-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2c2b26e6; backdrop-filter: blur(16px); padding: 20px; border-radius: 32px; z-index: 1000; text-align: center; border: 2px solid gold; }
  </style>
</head>
<body>
<div id="app">
  <div id="lobbyScreen" class="screen lobby-container">
    <h1>🎲 DOMÍNIO MULTI - SALAS</h1>
    <div class="room-list" id="roomListContainer"><div style="text-align:center; color:#ffd58c;">Carregando salas...</div></div>
    <div class="create-room-form">
      <h3 style="color:#ffeaac;">➕ Criar nova sala</h3>
      <div class="form-row">
        <input type="text" id="newRoomName" placeholder="Nome da sala" maxlength="30">
        <input type="text" id="newPlayerNick" placeholder="Seu nickname" maxlength="20">
      </div>
      <div class="form-row">
        <select id="maxPlayersSelect"><option value="2">2 jogadores</option><option value="4">4 jogadores</option></select>
        <input type="text" id="roomPassword" placeholder="Senha (opcional)">
        <button id="createRoomBtn">CRIAR SALA</button>
      </div>
    </div>
    <div class="join-code-form">
      <h3 style="color:#ffeaac;">🔑 Entrar por código</h3>
      <div class="form-row">
        <input type="text" id="joinCodeInput" placeholder="Código da sala">
        <input type="text" id="joinNickname" placeholder="Seu nickname">
        <button id="joinByCodeBtn">ENTRAR</button>
      </div>
    </div>
    <div id="lobbyStatus" class="status-msg"></div>
  </div>

  <div id="gameScreen" class="screen hidden">
    <div class="game-chat-layout">
      <div class="game-area" id="gameArea">
        <div class="players-row" id="playersContainer"></div>
        <div class="board"><div style="text-align:center; color:#ffe0a3;">🃏 MESA CENTRAL</div><div class="domino-chain" id="boardChain"></div><div class="status-text" id="gameStatusMsg">Aguardando partida...</div></div>
        <div class="domino-hand" id="myHand"></div>
        <div class="action-bar">
          <button id="toqueBtn">🔔 TOQUE</button>
          <button id="passarBtn">⏩ PASSAR</button>
          <button id="rotateViewBtn">🔄 Girar 180°</button>
          <button id="leaveRoomBtn">🚪 Sair</button>
        </div>
      </div>
      <div class="chat-area">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area"><input type="text" id="chatInput" placeholder="Mensagem..."><button id="sendChatBtn">Enviar</button></div>
        <div class="reactions"><button class="reaction-btn" data-reaction="🔥">🔥</button><button class="reaction-btn" data-reaction="😂">😂</button><button class="reaction-btn" data-reaction="😡">😡</button><button class="reaction-btn" data-reaction="👏">👏</button></div>
      </div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://wkcfgbtsmsfksfiqavvc.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_cDI94Uts3TOXG2kA9IzHAw_OsvZcW4n";
  let supabaseClient, currentRoomId, currentNick, currentPlayerId, rotationAngle = 0, heartbeatInterval, gameSubscription, chatSubscription;

  const DominoRules = {
    createDeck() { let deck = []; for (let i=0;i<=6;i++) for (let j=i;j<=6;j++) deck.push({left:i, right:j}); return deck; },
    shuffle(deck) { for (let i=deck.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; } return deck; },
    canPlay(piece, leftEnd, rightEnd, isFirstMove) { if (isFirstMove) return true; return (piece.left===leftEnd || piece.right===leftEnd || piece.left===rightEnd || piece.right===rightEnd); },
    applyPlay(board, leftEnd, rightEnd, piece, side) {
      let newBoard = [...board], newLeft = leftEnd, newRight = rightEnd;
      if (board.length===0) { newBoard.push(piece); newLeft=piece.left; newRight=piece.right; return {newBoard, newLeft, newRight}; }
      if (side==='left') {
        if (piece.right===leftEnd) { newBoard.unshift({left:piece.left, right:piece.right}); newLeft=piece.left; }
        else if (piece.left===leftEnd) { newBoard.unshift({left:piece.right, right:piece.left}); newLeft=piece.right; }
        else return null;
      } else if (side==='right') {
        if (piece.left===rightEnd) { newBoard.push({left:piece.left, right:piece.right}); newRight=piece.right; }
        else if (piece.right===rightEnd) { newBoard.push({left:piece.right, right:piece.left}); newRight=piece.left; }
        else return null;
      } else return null;
      return {newBoard, newLeft, newRight};
    },
    handSum(hand) { return hand.reduce((s,p)=>s+p.left+p.right,0); },
    isGameBlocked(state) {
      if (!state.hands) return false;
      const playersWithHands = state.players.filter(p => state.hands[p.id] && state.hands[p.id].length > 0);
      if (playersWithHands.length !== state.players.length) return false; // alguém sem mão ainda
      if (state.stock.length > 0) return false;
      return state.players.every(p => {
        const hand = state.hands[p.id];
        if (!hand || hand.length===0) return true;
        return !hand.some(piece => DominoRules.canPlay(piece, state.leftEnd, state.rightEnd, state.board.length===0));
      });
    },
    getWinnerBySum(state) {
      let bestPlayer=null, bestSum=Infinity;
      for (let p of state.players) { const sum=DominoRules.handSum(state.hands[p.id]); if (sum<bestSum) { bestSum=sum; bestPlayer=p.id; } }
      return bestPlayer;
    },
    getSpecialWin(board, lastPiece, playerHandAfter) {
      if (playerHandAfter.length!==0) return null;
      if (!lastPiece) return null;
      if (lastPiece.left===lastPiece.right) return {type:"carroca", points:2};
      if (board.length>=2 && board[0].left===board[board.length-1].right) return {type:"lae lo", points:3};
      return {type:"normal", points:1};
    }
  };

  function showLobby() { document.getElementById('lobbyScreen').classList.remove('hidden'); document.getElementById('gameScreen').classList.add('hidden'); loadRoomList(); }
  function showGame() { document.getElementById('lobbyScreen').classList.add('hidden'); document.getElementById('gameScreen').classList.remove('hidden'); }
  async function initSupabase() { supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }

  async function loadRoomList() {
    const { data, error } = await supabaseClient.from('rooms').select('id, room_name, max_players, password, players_list').in('status', ['open', 'playing']);
    if (error) return;
    const container = document.getElementById('roomListContainer');
    if (!data || data.length===0) { container.innerHTML = '<div style="text-align:center; color:#ffd58c;">Nenhuma sala disponível.</div>'; return; }
    container.innerHTML = '';
    for (let room of data) {
      const playersCount = room.players_list?.length || 0;
      const maxPlayers = room.max_players || 2;
      const isProtected = room.password && room.password.length>0;
      const div = document.createElement('div'); div.className='room-item';
      div.innerHTML = `<div class="room-info"><div class="room-name">🏠 ${room.room_name || room.id} (${playersCount}/${maxPlayers})</div><div class="room-details">Código: ${room.id} ${isProtected?'🔒 Protegida':'🔓 Aberta'}</div></div><button class="join-room-btn" data-room-id="${room.id}" data-protected="${isProtected}">Entrar</button>`;
      container.appendChild(div);
    }
    document.querySelectorAll('.join-room-btn').forEach(btn => btn.addEventListener('click', async (e) => {
      const roomId = btn.dataset.roomId, isProtected = btn.dataset.protected==='true';
      let password = null;
      if (isProtected) { password = prompt("Senha da sala:"); if (!password) return; }
      const nick = prompt("Seu nickname:") || "Anonimo";
      await joinRoomById(roomId, nick, password);
    }));
  }

  async function joinRoomById(roomId, nickname, password) {
    const { data: room, error } = await supabaseClient.from('rooms').select('*').eq('id', roomId).single();
    if (error || !room) { alert("Sala não encontrada"); return; }
    if (room.password && room.password !== password) { alert("Senha incorreta"); return; }
    const playersList = room.players_list || [];
    const maxPlayers = room.max_players || 2;
    if (playersList.length >= maxPlayers) { alert(`Sala cheia (max ${maxPlayers})`); return; }
    const { data: playerData, error: playerError } = await supabaseClient.from('players').insert({ nickname, room_id: roomId, last_seen: new Date() }).select().single();
    if (playerError) { alert("Erro: "+playerError.message); return; }
    currentPlayerId = playerData.id; currentRoomId = roomId; currentNick = nickname;
    let gameState = room.game_state;
    if (!gameState) gameState = { players: [], hands: {}, stock: [], board: [], leftEnd: null, rightEnd: null, turn: null, status: 'waiting', winner: null, winType: null };
    if (!gameState.players) gameState.players = [];
    gameState.players.push({ id: currentPlayerId, nick: nickname });
    await supabaseClient.from('rooms').update({ players_list: [...playersList, nickname], game_state: gameState }).eq('id', roomId);
    await setupSubscriptionsAndGame(roomId);
  }

  async function createNewRoom() {
    const roomName = document.getElementById('newRoomName').value.trim();
    const nickname = document.getElementById('newPlayerNick').value.trim();
    const maxPlayers = parseInt(document.getElementById('maxPlayersSelect').value);
    const password = document.getElementById('roomPassword').value.trim();
    if (!roomName || !nickname) { alert("Preencha nome da sala e nickname"); return; }
    const { count } = await supabaseClient.from('rooms').select('*', { count: 'exact', head: true });
    if (count >= 10) { alert("Limite de 10 salas"); return; }
    const roomId = Math.random().toString(36).substring(2,8).toUpperCase();
    const initialState = { players: [], hands: {}, stock: [], board: [], leftEnd: null, rightEnd: null, turn: null, status: 'waiting', winner: null, winType: null };
    const { error: roomError } = await supabaseClient.from('rooms').insert({ id: roomId, room_name: roomName, max_players: maxPlayers, password: password || null, game_state: initialState, players_list: [], status: 'open' });
    if (roomError) { alert("Erro: "+roomError.message); return; }
    const { data: playerData, error: playerError } = await supabaseClient.from('players').insert({ nickname, room_id: roomId, last_seen: new Date() }).select().single();
    if (playerError) { alert("Erro ao criar jogador"); return; }
    currentPlayerId = playerData.id; currentRoomId = roomId; currentNick = nickname;
    initialState.players.push({ id: currentPlayerId, nick: nickname });
    await supabaseClient.from('rooms').update({ players_list: [nickname], game_state: initialState }).eq('id', roomId);
    await setupSubscriptionsAndGame(roomId);
  }

  async function joinByCode() {
    const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
    const nickname = document.getElementById('joinNickname').value.trim();
    if (!code || !nickname) { alert("Preencha código e nickname"); return; }
    await joinRoomById(code, nickname, null);
  }

  async function tryStartGame(roomId, currentGameState) {
    if (!currentGameState || currentGameState.status !== 'waiting') return false;
    const players = currentGameState.players;
    if (players.length < 2) return false;
    if (currentGameState.hands && Object.keys(currentGameState.hands).length === players.length) {
      if (currentGameState.status === 'waiting') {
        const newState = { ...currentGameState, status: 'playing', turn: players[0].id };
        await supabaseClient.from('rooms').update({ game_state: newState }).eq('id', roomId);
      }
      return false;
    }
    let deck = DominoRules.createDeck();
    DominoRules.shuffle(deck);
    const hands = {};
    for (let p of players) hands[p.id] = deck.splice(0, 7);
    const newState = { ...currentGameState, hands, stock: deck, board: [], leftEnd: null, rightEnd: null, turn: players[0].id, status: 'playing', winner: null, winType: null };
    const { error } = await supabaseClient.from('rooms').update({ game_state: newState }).eq('id', roomId);
    if (error) console.error("Erro ao iniciar jogo:", error);
    return !error;
  }

  async function tryPlayPiece(piece, side) {
    if (!currentRoomId || !currentPlayerId) return;
    const { data: room } = await supabaseClient.from('rooms').select('game_state').eq('id', currentRoomId).single();
    if (!room || !room.game_state) return;
    let state = room.game_state;
    if (state.status !== 'playing') { alert("Jogo já finalizado!"); return; }
    if (state.turn !== currentPlayerId) { alert("Não é sua vez!"); return; }
    const hand = state.hands[currentPlayerId];
    if (!hand) return;
    const pieceIndex = hand.findIndex(p => p.left===piece.left && p.right===piece.right);
    if (pieceIndex === -1) return;
    const isValid = DominoRules.canPlay(piece, state.leftEnd, state.rightEnd, state.board.length===0);
    if (!isValid) { alert("Peça não encaixa!"); return; }
    let chosenSide = side;
    if (state.board.length===0) chosenSide = 'right';
    const result = DominoRules.applyPlay(state.board, state.leftEnd, state.rightEnd, piece, chosenSide);
    if (!result) { alert("Erro ao encaixar"); return; }
    const newHand = [...hand]; newHand.splice(pieceIndex,1);
    const newState = { ...state, board: result.newBoard, leftEnd: result.newLeft, rightEnd: result.newRight, hands: { ...state.hands, [currentPlayerId]: newHand }, lastMoveBy: currentPlayerId, lastPiece: piece };
    if (newHand.length === 0) {
      newState.status = 'finished';
      newState.winner = currentPlayerId;
      const special = DominoRules.getSpecialWin(newState.board, piece, newHand);
      newState.winType = special ? special.type : 'normal';
    } else {
      const players = newState.players;
      const currentIdx = players.findIndex(p => p.id === currentPlayerId);
      const nextIdx = (currentIdx + 1) % players.length;
      newState.turn = players[nextIdx].id;
    }
    if (newState.status === 'playing' && newState.board.length > 0 && DominoRules.isGameBlocked(newState)) {
      const winnerId = DominoRules.getWinnerBySum(newState);
      newState.status = 'finished';
      newState.winner = winnerId;
      newState.winType = 'blocked';
    }
    await supabaseClient.from('rooms').update({ game_state: newState }).eq('id', currentRoomId);
  }

  async function toqueAction() {
    if (!currentRoomId || !currentPlayerId) return;
    const { data: room } = await supabaseClient.from('rooms').select('game_state').eq('id', currentRoomId).single();
    if (!room || !room.game_state) return;
    let state = room.game_state;
    if (state.status !== 'playing') { alert("Jogo finalizado"); return; }
    if (state.turn !== currentPlayerId) { alert("Não é sua vez"); return; }
    const hand = state.hands[currentPlayerId];
    const canPlay = hand.some(p => DominoRules.canPlay(p, state.leftEnd, state.rightEnd, state.board.length===0));
    if (canPlay) { alert("Você tem jogadas!"); return; }
    let newState = { ...state };
    if (newState.stock && newState.stock.length > 0) {
      const drawn = newState.stock.pop();
      const newHand = [...hand, drawn];
      newState.hands = { ...newState.hands, [currentPlayerId]: newHand };
      const nowCanPlay = newHand.some(p => DominoRules.canPlay(p, newState.leftEnd, newState.rightEnd, newState.board.length===0));
      if (!nowCanPlay) {
        const players = newState.players;
        const idx = players.findIndex(p => p.id === currentPlayerId);
        newState.turn = players[(idx + 1) % players.length];
      }
    } else {
      const players = newState.players;
      const idx = players.findIndex(p => p.id === currentPlayerId);
      newState.turn = players[(idx + 1) % players.length];
    }
    await supabaseClient.from('rooms').update({ game_state: newState }).eq('id', currentRoomId);
  }

  async function passarTurno() {
    if (!currentRoomId || !currentPlayerId) return;
    const { data: room } = await supabaseClient.from('rooms').select('game_state').eq('id', currentRoomId).single();
    if (!room || !room.game_state) return;
    let state = room.game_state;
    if (state.status !== 'playing') { alert("Jogo finalizado"); return; }
    if (state.turn !== currentPlayerId) { alert("Não é sua vez"); return; }
    const hand = state.hands[currentPlayerId];
    const canPlay = hand.some(p => DominoRules.canPlay(p, state.leftEnd, state.rightEnd, state.board.length===0));
    if (canPlay) { alert("Você tem jogadas! Não pode passar."); return; }
    const players = state.players;
    const idx = players.findIndex(p => p.id === currentPlayerId);
    const newTurn = players[(idx + 1) % players.length].id;
    const newState = { ...state, turn: newTurn };
    await supabaseClient.from('rooms').update({ game_state: newState }).eq('id', currentRoomId);
  }

  function renderGameUI(state) {
    if (!state) return;
    const boardDiv = document.getElementById('boardChain');
    boardDiv.innerHTML = '';
    if (state.board?.length) state.board.forEach(p => { const div = document.createElement('div'); div.className='domino-piece'; div.innerText=`${p.left}|${p.right}`; boardDiv.appendChild(div); });
    else boardDiv.innerHTML = '<div style="color:#ffdca8;">Nenhuma peça</div>';
    const myHand = state.hands?.[currentPlayerId] || [];
    const handContainer = document.getElementById('myHand');
    handContainer.innerHTML = '';
    myHand.forEach(piece => {
      const pieceDiv = document.createElement('div'); pieceDiv.className='domino-piece'; pieceDiv.innerText=`${piece.left}|${piece.right}`;
      const isValid = DominoRules.canPlay(piece, state.leftEnd, state.rightEnd, state.board.length===0);
      if (isValid && state.turn===currentPlayerId && state.status==='playing') pieceDiv.classList.add('valid-highlight');
      pieceDiv.onclick = () => {
        if (state.turn!==currentPlayerId) return alert("Não é sua vez");
        if (state.status!=='playing') return;
        if (!isValid) return alert("Peça não encaixa");
        const leftMatch = (piece.left===state.leftEnd || piece.right===state.leftEnd);
        const rightMatch = (piece.left===state.rightEnd || piece.right===state.rightEnd);
        if (state.board.length>0 && leftMatch && rightMatch) {
          const modal = document.createElement('div'); modal.className='side-choice-modal';
          modal.innerHTML = `<p>Escolha lado</p><button id="chLeft">Esquerda</button><button id="chRight">Direita</button><button id="chCancel">Cancelar</button>`;
          document.body.appendChild(modal);
          document.getElementById('chLeft').onclick = () => { tryPlayPiece(piece,'left'); modal.remove(); };
          document.getElementById('chRight').onclick = () => { tryPlayPiece(piece,'right'); modal.remove(); };
          document.getElementById('chCancel').onclick = () => modal.remove();
        } else if (leftMatch) tryPlayPiece(piece,'left');
        else tryPlayPiece(piece,'right');
      };
      handContainer.appendChild(pieceDiv);
    });
    const playersContainer = document.getElementById('playersContainer');
    playersContainer.innerHTML = '';
    if (state.players) state.players.forEach(p => {
      const card = document.createElement('div'); card.className='player-card';
      if (state.turn===p.id) card.classList.add('active-turn');
      let pieceCount = state.hands[p.id]?.length || 0;
      card.innerText = `${p.nick} (${pieceCount}) ${p.id===currentPlayerId?'👈':''}`;
      playersContainer.appendChild(card);
    });
    const statusDiv = document.getElementById('gameStatusMsg');
    if (state.status==='playing') {
      const currentPlayerNick = state.players.find(p=>p.id===state.turn)?.nick || '?';
      statusDiv.innerHTML = `🎲 Turno: ${currentPlayerNick} | Monte: ${state.stock?.length||0}`;
    } else {
      const winnerNick = state.players.find(p=>p.id===state.winner)?.nick || 'Alguém';
      let winText = `🏆 Vencedor: ${winnerNick}`;
      if (state.winType==='carroca') winText += ' (Carroça! +2 pts)';
      else if (state.winType==='lae lo') winText += ' (Lá e Ló! +3 pts)';
      else if (state.winType==='blocked') winText += ' (Bloqueio - menor soma)';
      statusDiv.innerHTML = winText;
    }
    document.getElementById('gameArea').style.transform = rotationAngle===180 ? 'rotate(180deg)' : 'none';
  }

  async function setupSubscriptionsAndGame(roomId) {
    showGame();
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    heartbeatInterval = setInterval(async () => { if (currentPlayerId) await supabaseClient.from('players').update({ last_seen: new Date() }).eq('id', currentPlayerId); }, 20000);
    if (gameSubscription) await gameSubscription.unsubscribe();
    let startingFlag = false;
    gameSubscription = supabaseClient.channel(`room-${roomId}`).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${roomId}` }, async (payload) => {
      if (payload.new && payload.new.game_state) {
        let state = payload.new.game_state;
        renderGameUI(state);
        if (state.status === 'waiting' && state.players && state.players.length >= 2 && !startingFlag) {
          startingFlag = true;
          await tryStartGame(roomId, state);
          startingFlag = false;
        }
      }
    }).subscribe();
    if (chatSubscription) await chatSubscription.unsubscribe();
    chatSubscription = supabaseClient.channel(`chat-${roomId}`).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${roomId}` }, payload => {
      const container = document.getElementById('chatMessages');
      const div = document.createElement('div'); div.className='chat-message';
      div.innerHTML = `<strong>${payload.new.nickname}:</strong> ${payload.new.content}`;
      container.appendChild(div); container.scrollTop = container.scrollHeight;
    }).subscribe();
    const { data: roomData } = await supabaseClient.from('rooms').select('game_state').eq('id', roomId).single();
    if (roomData?.game_state) renderGameUI(roomData.game_state);
  }

  async function sendMessage(text, isReaction=false) {
    if (!currentRoomId || !currentNick) return;
    await supabaseClient.from('messages').insert({ room_id: currentRoomId, nickname: currentNick, content: text, type: isReaction?'reaction':'message' });
  }

  window.onload = async () => {
    await initSupabase();
    showLobby();
    document.getElementById('createRoomBtn').onclick = createNewRoom;
    document.getElementById('joinByCodeBtn').onclick = joinByCode;
    document.getElementById('sendChatBtn').onclick = () => { const input = document.getElementById('chatInput'); if (input.value.trim()) sendMessage(input.value.trim()); input.value=''; };
    document.querySelectorAll('.reaction-btn').forEach(btn => btn.onclick = () => sendMessage(`reagiu: ${btn.dataset.reaction}`, true));
    document.getElementById('toqueBtn').onclick = toqueAction;
    document.getElementById('passarBtn').onclick = passarTurno;
    document.getElementById('rotateViewBtn').onclick = () => { rotationAngle = rotationAngle===180?0:180; (async () => { const { data: room } = await supabaseClient.from('rooms').select('game_state').eq('id', currentRoomId).single(); if (room?.game_state) renderGameUI(room.game_state); })(); };
    document.getElementById('leaveRoomBtn').onclick = () => { if (confirm("Sair da sala?")) location.reload(); };
    setInterval(() => { if (!document.getElementById('lobbyScreen').classList.contains('hidden')) loadRoomList(); }, 5000);
  };
</script>

<script>

  const SUPABASE_URL = "https://wkcfgbtsmsfksfiqavvc.supabase.co";

  // DOMINO RULES (mesmo motor)
  const DominoRules = {
    createDeck() {
      let deck = [];
      for (let i = 0; i <= 6; i++)
        for (let j = i; j <= 6; j++)
          deck.push({ left: i, right: j });
      return deck;
    },
    shuffle(deck) {
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      return deck;
    },
    canPlay(piece, leftEnd, rightEnd, isFirstMove) {
      if (isFirstMove) return true;
      return (piece.left === leftEnd || piece.right === leftEnd || piece.left === rightEnd || piece.right === rightEnd);
    },
    applyPlay(board, leftEnd, rightEnd, piece, side) {
      let newBoard = [...board];
      let newLeft = leftEnd;
      let newRight = rightEnd;
      if (board.length === 0) {
        newBoard.push(piece);
        newLeft = piece.left;
        newRight = piece.right;
        return { newBoard, newLeft, newRight };
      }
      if (side === 'left') {
        if (piece.right === leftEnd) {
          newBoard.unshift({ left: piece.left, right: piece.right });
          newLeft = piece.left;
        } else if (piece.left === leftEnd) {
          newBoard.unshift({ left: piece.right, right: piece.left });
          newLeft = piece.right;
        } else return null;
      } else if (side === 'right') {
        if (piece.left === rightEnd) {
          newBoard.push({ left: piece.left, right: piece.right });
          newRight = piece.right;
        } else if (piece.right === rightEnd) {
          newBoard.push({ left: piece.right, right: piece.left });
          newRight = piece.left;
        } else return null;
      } else return null;
      return { newBoard, newLeft, newRight };
    },
    handSum(hand) {
      return hand.reduce((s, p) => s + p.left + p.right, 0);
    },
    isGameBlocked(state) {
      if (state.stock.length > 0) return false;
      for (let p of state.players) {
        const hand = state.hands[p.id];
        if (!hand) continue;
        const hasMove = hand.some(piece => DominoRules.canPlay(piece, state.leftEnd, state.rightEnd, state.board.length === 0));
        if (hasMove) return false;
      }
      return true;
    },
    getWinnerBySum(state) {
      let bestPlayer = null;
      let bestSum = Infinity;
      for (let p of state.players) {
        const sum = DominoRules.handSum(state.hands[p.id]);
        if (sum < bestSum) {
          bestSum = sum;
          bestPlayer = p.id;
        }
      }
      return bestPlayer;
    },
    getSpecialWin(board, lastPiece, playerHandAfter) {
      if (playerHandAfter.length !== 0) return null;
      if (!lastPiece) return null;
      if (lastPiece.left === lastPiece.right) return { type: "carroca", points: 2 };
      if (board.length >= 2 && board[0].left === board[board.length-1].right) return { type: "lae lo", points: 3 };
      return { type: "normal", points: 1 };
    }
  };

  async function initSupabase() {

  }

  // Carregar lista de salas abertas
  async function loadRoomList() {
    const { data, error } = await supabaseClient
      .from('rooms')
      .select('id, room_name, max_players, password, players_list, game_state')
      .in('status', ['open', 'playing']);
    if (error) {
      console.error(error);
      return;
    }
    const container = document.getElementById('roomListContainer');
    if (!data || data.length === 0) {
      container.innerHTML = '<div style="text-align:center; color:#ffd58c;">Nenhuma sala disponível. Crie uma!</div>';
      return;
    }
    container.innerHTML = '';
    for (let room of data) {
      const playersCount = room.players_list ? room.players_list.length : 0;
      const maxPlayers = room.max_players || 2;
      const isProtected = room.password && room.password.length > 0;
      const roomDiv = document.createElement('div');

          <div class="room-name">🏠 ${room.room_name || room.id} (${playersCount}/${maxPlayers})</div>

  async function joinRoomById(roomId, nickname, password) {
    // Verificar se sala existe e se a senha está correta
    const { data: room, error } = await supabaseClient
      .from('rooms')
      .select('*')
      .eq('id', roomId)
      .single();
    if (error || !room) {
      alert("Sala não encontrada");
      return;
    }
    if (room.password && room.password !== password) {
      alert("Senha incorreta!");
      return;
    }
    const playersList = room.players_list || [];
    const maxPlayers = room.max_players || 2;
    if (playersList.length >= maxPlayers) {
      alert(`Sala cheia (máximo ${maxPlayers} jogadores).`);
      return;
    }
    // Registrar jogador
    const { data: playerData, error: playerError } = await supabaseClient
      .from('players')
      .insert({ nickname, room_id: roomId, last_seen: new Date() })
      .select()
      .single();
    if (playerError) { alert("Erro: " + playerError.message); return; }
    currentPlayerId = playerData.id;
    currentRoomId = roomId;
    currentNick = nickname;
    // Atualizar sala
    const newPlayersList = [...playersList, nickname];
    let gameState = room.game_state;
    if (!gameState) {
      gameState = { players: [], hands: {}, stock: [], board: [], leftEnd: null, rightEnd: null, turn: null, status: 'waiting', winner: null, winType: null };
    }
    if (!gameState.players) gameState.players = [];
    gameState.players.push({ id: currentPlayerId, nick: nickname });
    await supabaseClient
      .from('rooms')
      .update({ players_list: newPlayersList, game_state: gameState })
      .eq('id', roomId);
    await setupSubscriptionsAndGame(roomId);
  }

  async function createNewRoom() {
    const roomName = document.getElementById('newRoomName').value.trim();
    const nickname = document.getElementById('newPlayerNick').value.trim();
    const maxPlayers = parseInt(document.getElementById('maxPlayersSelect').value);
    const password = document.getElementById('roomPassword').value.trim();
    if (!roomName) { alert("Digite o nome da sala"); return; }
    if (!nickname) { alert("Digite seu nickname"); return; }
    // Verificar limite de salas
    const { count } = await supabaseClient.from('rooms').select('*', { count: 'exact', head: true });
    if (count >= 10) { alert("Limite de 10 salas atingido"); return; }
    const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
    const initialState = {
      players: [],
      hands: {},
      stock: [],
      board: [],
      leftEnd: null,
      rightEnd: null,
      turn: null,
      status: 'waiting',
      winner: null,
      winType: null
    };
    const { error: roomError } = await supabaseClient
      .from('rooms')
      .insert({
        id: roomId,
        room_name: roomName,
        max_players: maxPlayers,
        password: password || null,
        game_state: initialState,
        players_list: [],
        status: 'open'
      });
    if (roomError) { alert("Erro: " + roomError.message); return; }
    // Criar jogador e entrar
    const { data: playerData, error: playerError } = await supabaseClient
      .from('players')
      .insert({ nickname, room_id: roomId, last_seen: new Date() })
      .select()
      .single();
    if (playerError) { alert("Erro ao criar jogador"); return; }
    currentPlayerId = playerData.id;
    currentRoomId = roomId;
    currentNick = nickname;
    initialState.players.push({ id: currentPlayerId, nick: nickname });
    await supabaseClient
      .from('rooms')
      .update({ players_list: [nickname], game_state: initialState })
      .eq('id', roomId);
    await setupSubscriptionsAndGame(roomId);
  }

  async function joinByCode() {
    const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
    const nickname = document.getElementById('joinNickname').value.trim();
    if (!code) { alert("Digite o código da sala"); return; }
    if (!nickname) { alert("Digite seu nickname"); return; }
    await joinRoomById(code, nickname, null);
  }

  // Engine do jogo (as mesmas funções tryPlayPiece, toqueAction, etc)
  async function tryPlayPiece(piece, side) { /* igual anterior */ 
    if (!currentRoomId || !currentPlayerId) return;
    const { data: room } = await supabaseClient.from('rooms').select('game_state').eq('id', currentRoomId).single();
    if (!room || !room.game_state) return;
    let state = room.game_state;
    if (state.status !== 'playing') { alert("Jogo já finalizado!"); return; }
    if (state.turn !== currentPlayerId) { alert("Não é sua vez!"); return; }
    const hand = state.hands[currentPlayerId];
    if (!hand) return;
    const pieceIndex = hand.findIndex(p => p.left === piece.left && p.right === piece.right);
    if (pieceIndex === -1) return;
    const isValid = DominoRules.canPlay(piece, state.leftEnd, state.rightEnd, state.board.length === 0);
    if (!isValid) { alert("Peça não encaixa!"); return; }
    let chosenSide = side;
    if (state.board.length === 0) chosenSide = 'right';
    const result = DominoRules.applyPlay(state.board, state.leftEnd, state.rightEnd, piece, chosenSide);
    if (!result) { alert("Erro ao encaixar"); return; }
    const newHand = [...hand];
    newHand.splice(pieceIndex, 1);
    const newState = {
      ...state,
      board: result.newBoard,
      leftEnd: result.newLeft,
      rightEnd: result.newRight,
      hands: { ...state.hands, [currentPlayerId]: newHand },
      lastMoveBy: currentPlayerId,
      lastPiece: piece
    };
    if (newHand.length === 0) {
      newState.status = 'finished';
      newState.winner = currentPlayerId;
      const special = DominoRules.getSpecialWin(newState.board, piece, newHand);
      newState.winType = special ? special.type : 'normal';
    } else {
      const players = newState.players;
      const currentIdx = players.findIndex(p => p.id === currentPlayerId);
      const nextIdx = (currentIdx + 1) % players.length;
      newState.turn = players[nextIdx].id;
    }
    if (newState.status === 'playing' && DominoRules.isGameBlocked(newState)) {
      const winnerId = DominoRules.getWinnerBySum(newState);
      newState.status = 'finished';
      newState.winner = winnerId;
      newState.winType = 'blocked';
    }
    await supabaseClient.from('rooms').update({ game_state: newState }).eq('id', currentRoomId);
  }

  async function toqueAction() {
    if (!currentRoomId || !currentPlayerId) return;
    const { data: room } = await supabaseClient.from('rooms').select('game_state').eq('id', currentRoomId).single();
    if (!room || !room.game_state) return;
    let state = room.game_state;
    if (state.status !== 'playing') { alert("Jogo finalizado"); return; }
    if (state.turn !== currentPlayerId) { alert("Não é sua vez"); return; }
    const hand = state.hands[currentPlayerId];
    const canPlay = hand.some(p => DominoRules.canPlay(p, state.leftEnd, state.rightEnd, state.board.length === 0));
    if (canPlay) { alert("Você tem jogadas!"); return; }
    let newState = { ...state };
    if (newState.stock && newState.stock.length > 0) {
      const drawn = newState.stock.pop();
      const newHand = [...hand, drawn];
      newState.hands = { ...newState.hands, [currentPlayerId]: newHand };
      const nowCanPlay = newHand.some(p => DominoRules.canPlay(p, newState.leftEnd, newState.rightEnd, newState.board.length === 0));
      if (!nowCanPlay) {
        const players = newState.players;
        const idx = players.findIndex(p => p.id === currentPlayerId);
        newState.turn = players[(idx + 1) % players.length];
      }
    } else {
      const players = newState.players;
      const idx = players.findIndex(p => p.id === currentPlayerId);
      newState.turn = players[(idx + 1) % players.length];
    }
    await supabaseClient.from('rooms').update({ game_state: newState }).eq('id', currentRoomId);
  }

  async function passarTurno() {
    if (!currentRoomId || !currentPlayerId) return;
    const { data: room } = await supabaseClient.from('rooms').select('game_state').eq('id', currentRoomId).single();
    if (!room || !room.game_state) return;
    let state = room.game_state;
    if (state.status !== 'playing') { alert("Jogo finalizado"); return; }
    if (state.turn !== currentPlayerId) { alert("Não é sua vez"); return; }
    const hand = state.hands[currentPlayerId];
    const canPlay = hand.some(p => DominoRules.canPlay(p, state.leftEnd, state.rightEnd, state.board.length === 0));
    if (canPlay) { alert("Você tem jogadas! Não pode passar."); return; }
    const players = state.players;
    const idx = players.findIndex(p => p.id === currentPlayerId);
    const newTurn = players[(idx + 1) % players.length].id;
    const newState = { ...state, turn: newTurn };
    await supabaseClient.from('rooms').update({ game_state: newState }).eq('id', currentRoomId);
  }

  function renderGameUI(state) {
    if (!state) return;
    const boardDiv = document.getElementById('boardChain');
    boardDiv.innerHTML = '';
    if (state.board && state.board.length) {
      state.board.forEach(p => { const div = document.createElement('div'); div.className = 'domino-piece'; div.innerText = `${p.left}|${p.right}`; boardDiv.appendChild(div); });
    } else boardDiv.innerHTML = '<div style="color:#ffdca8;">Nenhuma peça jogada</div>';
    const myHand = state.hands && state.hands[currentPlayerId] ? state.hands[currentPlayerId] : [];
    const handContainer = document.getElementById('myHand');
    handContainer.innerHTML = '';
    myHand.forEach(piece => {
      const pieceDiv = document.createElement('div'); pieceDiv.className = 'domino-piece'; pieceDiv.innerText = `${piece.left}|${piece.right}`;
      const isValid = DominoRules.canPlay(piece, state.leftEnd, state.rightEnd, state.board.length === 0);
      if (isValid && state.turn === currentPlayerId && state.status === 'playing') pieceDiv.classList.add('valid-highlight');
      pieceDiv.onclick = () => {
        if (state.turn !== currentPlayerId) return alert("Não é sua vez");
        if (state.status !== 'playing') return;
        if (!isValid) return alert("Peça não encaixa");
        const leftMatch = (piece.left === state.leftEnd || piece.right === state.leftEnd);
        const rightMatch = (piece.left === state.rightEnd || piece.right === state.rightEnd);
        if (state.board.length > 0 && leftMatch && rightMatch) {
          const modal = document.createElement('div'); modal.className = 'side-choice-modal';
          modal.innerHTML = `<p>Escolha lado</p><button id="chLeft">Esquerda</button><button id="chRight">Direita</button><button id="chCancel">Cancelar</button>`;
          document.body.appendChild(modal);
          document.getElementById('chLeft').onclick = () => { tryPlayPiece(piece, 'left'); modal.remove(); };
          document.getElementById('chRight').onclick = () => { tryPlayPiece(piece, 'right'); modal.remove(); };
          document.getElementById('chCancel').onclick = () => modal.remove();
        } else if (leftMatch) tryPlayPiece(piece, 'left');
        else tryPlayPiece(piece, 'right');
      };
      handContainer.appendChild(pieceDiv);
    });
    const playersContainer = document.getElementById('playersContainer');
    playersContainer.innerHTML = '';
    if (state.players) state.players.forEach(p => {
      const card = document.createElement('div'); card.className = 'player-card';
      if (state.turn === p.id) card.classList.add('active-turn');
      let pieceCount = state.hands[p.id] ? state.hands[p.id].length : 0;
      card.innerText = `${p.nick} (${pieceCount}) ${p.id === currentPlayerId ? '👈' : ''}`;
      playersContainer.appendChild(card);
    });
    const statusDiv = document.getElementById('gameStatusMsg');
    if (state.status === 'playing') {
      const currentPlayerNick = state.players.find(p => p.id === state.turn)?.nick || '?';
      statusDiv.innerHTML = `🎲 Turno: ${currentPlayerNick} | Monte: ${state.stock?.length || 0}`;
    } else {
      const winnerNick = state.players.find(p => p.id === state.winner)?.nick || 'Alguém';
      let winText = `🏆 Vencedor: ${winnerNick}`;
      if (state.winType === 'carroca') winText += ' (Carroça! +2 pts)';
      else if (state.winType === 'lae lo') winText += ' (Lá e Ló! +3 pts)';
      else if (state.winType === 'blocked') winText += ' (Bloqueio - menor soma)';
      statusDiv.innerHTML = winText;
    }
    document.getElementById('gameArea').style.transform = rotationAngle === 180 ? 'rotate(180deg)' : 'none';
  }

  async function setupSubscriptionsAndGame(roomId) {
    showGame();
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    heartbeatInterval = setInterval(async () => {
      if (currentPlayerId) await supabaseClient.from('players').update({ last_seen: new Date() }).eq('id', currentPlayerId);
    }, 20000);
    if (gameSubscription) await gameSubscription.unsubscribe();
    gameSubscription = supabaseClient.channel(`room-${roomId}`).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${roomId}` }, async (payload) => {
      if (payload.new && payload.new.game_state) {
        let state = payload.new.game_state;
        renderGameUI(state);
        if (state.status === 'waiting' && state.players && state.players.length >= 2) {
          let deck = DominoRules.createDeck(); DominoRules.shuffle(deck);
          const hands = {};
          for (let p of state.players) hands[p.id] = deck.splice(0, 7);
          const newState = { ...state, hands, stock: deck, board: [], leftEnd: null, rightEnd: null, turn: state.players[0].id, status: 'playing' };
          await supabaseClient.from('rooms').update({ game_state: newState }).eq('id', roomId);
        }
      }
    }).subscribe();
    if (chatSubscription) await chatSubscription.unsubscribe();
    chatSubscription = supabaseClient.channel(`chat-${roomId}`).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${roomId}` }, payload => {
      const container = document.getElementById('chatMessages');
      const div = document.createElement('div'); div.className = 'chat-message';
      div.innerHTML = `<strong>${payload.new.nickname}:</strong> ${payload.new.content}`;
      container.appendChild(div); container.scrollTop = container.scrollHeight;
    }).subscribe();
    const { data: roomData } = await supabaseClient.from('rooms').select('game_state').eq('id', roomId).single();
    if (roomData?.game_state) renderGameUI(roomData.game_state);
  }

  async function sendMessage(text, isReaction = false) {
    if (!currentRoomId || !currentNick) return;
    await supabaseClient.from('messages').insert({ room_id: currentRoomId, nickname: currentNick, content: text, type: isReaction ? 'reaction' : 'message' });
  }

  window.onload = async () => {
    await initSupabase();
    showLobby();
    document.getElementById('createRoomBtn').onclick = createNewRoom;
    document.getElementById('joinByCodeBtn').onclick = joinByCode;
    document.getElementById('sendChatBtn').onclick = () => {
      const input = document.getElementById('chatInput');
      if (input.value.trim()) sendMessage(input.value.trim());
      input.value = '';
    };
    document.querySelectorAll('.reaction-btn').forEach(btn => btn.onclick = () => sendMessage(`reagiu: ${btn.dataset.reaction}`, true));
    document.getElementById('toqueBtn').onclick = toqueAction;
    document.getElementById('passarBtn').onclick = passarTurno;
    document.getElementById('rotateViewBtn').onclick = () => { rotationAngle = rotationAngle === 180 ? 0 : 180; (async () => { const { data: room } = await supabaseClient.from('rooms').select('game_state').eq('id', currentRoomId).single(); if (room?.game_state) renderGameUI(room.game_state); })(); };
    document.getElementById('leaveRoomBtn').onclick = () => { if (confirm("Sair?")) location.reload(); };
    setInterval(() => { if (document.getElementById('lobbyScreen') && !document.getElementById('lobbyScreen').classList.contains('hidden')) loadRoomList(); }, 5000);
  };
</script>
